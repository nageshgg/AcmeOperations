services:
  postgres:
    image: postgres:16
    container_name: acme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Step 2 adds init.sql here; Postgres auto-runs every .sql/.sh file in
      # this directory on first boot (only when the data volume is empty).
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: acme_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: acme_keycloak
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      # Fixes the token issuer to a single, stable URL regardless of whether
      # a request reaches Keycloak via the browser (http://localhost:8080)
      # or via the internal docker network (http://keycloak:8080 from the
      # `app` container). Without this, Keycloak derives the issuer from
      # each request's Host header, so tokens issued via one path and
      # validated via the other would carry a mismatched `iss` claim. The
      # `app` container still reaches Keycloak over the internal network
      # address for actually fetching JWKS/discovery data; only the
      # `iss` claim comparison uses this fixed external URL.
      KC_HOSTNAME: http://localhost:8080
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      # The Keycloak image has bash but not curl/wget, so health is checked by
      # opening a raw TCP connection to the management health endpoint
      # (port 9000, enabled via KC_HEALTH_ENABLED) and reading the HTTP status
      # line. This is the healthcheck pattern documented by the Keycloak
      # project itself for docker-compose setups.
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  mcp-server:
    build: ./mcp_server
    container_name: acme_mcp_server
    restart: unless-stopped
    ports:
      - "${MCP_SERVER_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./app
    container_name: acme_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
