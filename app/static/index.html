<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acme Operations Assistant</title>
<style>
  :root {
    --border: #e1e4e8;
    --bg: #eef1f8;
    --surface: #ffffff;
    --accent: #4f46e5;
    --accent-2: #06b6d4;
    --text: #1f2328;
    --muted: #6e7781;
    --danger: #c0362c;
    --danger-bg: #fdecea;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, #e4e9f7 100%);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1.25rem;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.25);
  }
  header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
  #identity { display: flex; align-items: center; gap: 0.75rem; }
  #avatar {
    width: 1.9rem;
    height: 1.9rem;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
  }
  #role-badge {
    background: rgba(255, 255, 255, 0.18);
    color: #fff;
    padding: 0.25rem 0.7rem;
    border-radius: 999px;
    font-size: 0.85rem;
  }
  #logout-btn {
    border: 1px solid rgba(255, 255, 255, 0.5);
    background: transparent;
    color: #fff;
    padding: 0.3rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #logout-btn:hover { background: rgba(255, 255, 255, 0.15); }
  main {
    display: flex;
    gap: 1rem;
    padding: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  #chat-panel {
    flex: 3;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    min-width: 0;
    box-shadow: 0 1px 3px rgba(31, 35, 40, 0.06);
  }
  #conversation {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    min-height: 50vh;
    max-height: 65vh;
  }
  .msg {
    padding: 0.55rem 0.9rem;
    border-radius: 12px;
    max-width: 80%;
    white-space: pre-wrap;
    line-height: 1.45;
  }
  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .msg.agent {
    align-self: flex-start;
    background: #f3f5fb;
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }
  .msg.denied {
    align-self: flex-start;
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    color: var(--danger);
  }
  .msg.loading {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0.7rem 1rem;
  }
  .msg.loading .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .msg.loading .dot:nth-child(2) { animation-delay: 0.2s; }
  .msg.loading .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
    40% { transform: scale(1); opacity: 1; }
  }
  #input-row {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem;
    border-top: 1px solid var(--border);
    background: #fafbfd;
  }
  #message-input {
    flex: 1;
    padding: 0.55rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #message-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
  }
  #send-btn {
    padding: 0.55rem 1.2rem;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s, transform 0.1s;
  }
  #send-btn:hover:not(:disabled) { opacity: 0.9; }
  #send-btn:active:not(:disabled) { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.5; cursor: default; }
  #side-column {
    flex: 2;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    min-width: 0;
    max-height: 78vh;
  }
  #escalation-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem;
    box-shadow: 0 1px 3px rgba(31, 35, 40, 0.06);
  }
  #escalation-panel h2 {
    font-size: 0.9rem;
    margin: 0 0 0.6rem 0;
    color: var(--accent);
  }
  #escalation-input-row { display: flex; gap: 0.5rem; }
  #escalation-customer-input {
    flex: 1;
    padding: 0.45rem 0.65rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #escalation-customer-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
  }
  #escalation-generate-btn {
    padding: 0.45rem 0.9rem;
    border: none;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
  }
  #escalation-generate-btn:disabled { opacity: 0.5; cursor: default; }
  #escalation-result { margin-top: 0.7rem; font-size: 0.85rem; line-height: 1.45; }
  #escalation-result .risk-badge {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .risk-low { background: #dafbe1; color: #1a7f37; }
  .risk-medium { background: #fff8c5; color: #9a6700; }
  .risk-high { background: #ffeee0; color: #bc4c00; }
  .risk-critical { background: var(--danger-bg); color: var(--danger); }
  #escalation-result .field-label { font-weight: 600; margin-top: 0.6rem; }
  #escalation-result ul { margin: 0.2rem 0 0 0; padding-left: 1.1rem; }
  #escalation-result .escalation-error { color: var(--danger); }
  #activity-panel {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem;
    overflow-y: auto;
    box-shadow: 0 1px 3px rgba(31, 35, 40, 0.06);
  }
  #activity-panel h2 {
    font-size: 0.9rem;
    margin: 0 0 0.6rem 0;
    cursor: pointer;
    user-select: none;
    color: var(--accent);
  }
  #activity-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .activity-entry {
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-2);
    border-radius: 6px;
    padding: 0.5rem 0.6rem;
    font-size: 0.82rem;
    background: #fafbfd;
  }
  .activity-entry .turn-label { font-weight: 600; margin-bottom: 0.3rem; color: var(--accent); }
  .activity-entry ul { margin: 0; padding-left: 1.1rem; }
  .activity-entry .no-tools { color: var(--muted); font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Acme Operations Assistant</h1>
  <div id="identity">
    <span id="avatar" hidden></span>
    <span id="role-badge" hidden></span>
    <button id="logout-btn" hidden>Log out</button>
  </div>
</header>

<main>
  <section id="chat-panel">
    <div id="conversation"></div>
    <div id="input-row">
      <input id="message-input" type="text" placeholder="Ask about a customer or issue..." disabled>
      <button id="send-btn" disabled>Send</button>
    </div>
  </section>

  <div id="side-column">
    <section id="escalation-panel">
      <h2>Escalation summary (SKILL)</h2>
      <div id="escalation-input-row">
        <input id="escalation-customer-input" type="text" placeholder="Customer name (e.g. Wayne Enterprises)" disabled>
        <button id="escalation-generate-btn" disabled>Generate</button>
      </div>
      <div id="escalation-result"></div>
    </section>

    <section id="activity-panel">
      <h2 id="activity-toggle">Agent activity &#9660;</h2>
      <div id="activity-list"></div>
    </section>
  </div>
</main>

<script type="module">
// keycloak-js@26+ ships as an ES module only (no UMD/global build), so it
// must be imported here rather than loaded via a plain <script src> tag --
// the latter throws a parse error on `export default` and silently leaves
// `Keycloak` undefined, which breaks the login redirect with no visible
// error in the page itself (only in the browser console).
import Keycloak from "https://cdn.jsdelivr.net/npm/keycloak-js@26.0.7/lib/keycloak.js";

// Conversation id returned by the first /chat response and reused on every
// following turn so the agent (via Redis-backed session_store) keeps
// context. Stays null until the first successful reply.
let conversationId = null;

// The single Keycloak adapter instance used for the whole page's lifetime.
let keycloak = null;

/**
 * Boots the Keycloak adapter using Authorization Code + PKCE (S256), and
 * redirects to the Keycloak login page if the user isn't already
 * authenticated. Resolves only once a valid token is available.
 */
async function initKeycloak() {
  keycloak = new Keycloak({
    url: "http://localhost:8080",
    realm: "acme-operations",
    clientId: "acme-app",
  });
  await keycloak.init({ onLoad: "login-required", pkceMethod: "S256" });
  return keycloak;
}

/**
 * Refreshes the access token if it's within 30 seconds of expiring.
 * Called before every API request so a long-idle tab doesn't send a
 * stale token and get an unnecessary 401.
 */
async function ensureFreshToken() {
  try {
    await keycloak.updateToken(30);
  } catch (err) {
    // Refresh token itself expired or was rejected -- only a fresh login can recover.
    keycloak.login();
  }
}

/**
 * Fetches the caller's identity from the existing GET /me endpoint and
 * renders the username badge (and an avatar initial) -- deliberately
 * shows just who's logged in, not what they're permitted to do, since
 * role/capability isn't something the UI needs to surface to the user.
 * Reuses the backend's own identity resolution instead of re-deriving
 * anything from the token client-side.
 */
async function renderIdentityBadge() {
  const res = await fetch("/me", {
    headers: { Authorization: "Bearer " + keycloak.token },
  });
  const data = await res.json();

  const avatar = document.getElementById("avatar");
  avatar.textContent = (data.username || "?").charAt(0).toUpperCase();
  avatar.hidden = false;

  const badge = document.getElementById("role-badge");
  badge.textContent = data.username;
  badge.hidden = false;

  document.getElementById("logout-btn").hidden = false;
}

/**
 * Appends one chat bubble to the conversation view.
 * `kind` is one of "user", "agent", or "denied" (each has its own style).
 */
function appendMessage(kind, text) {
  const div = document.createElement("div");
  div.className = "msg " + kind;
  div.textContent = text;
  const conversation = document.getElementById("conversation");
  conversation.appendChild(div);
  conversation.scrollTop = conversation.scrollHeight;
}

/**
 * Shows a bouncing-dots "the agent is working" bubble while a /chat
 * request is in flight, so a multi-second Gemini round trip (plus any
 * tool calls) doesn't look like the page has frozen.
 */
function appendLoading() {
  const div = document.createElement("div");
  div.className = "msg agent loading";
  div.id = "loading-indicator";
  div.innerHTML = "<span class=\"dot\"></span><span class=\"dot\"></span><span class=\"dot\"></span>";
  const conversation = document.getElementById("conversation");
  conversation.appendChild(div);
  conversation.scrollTop = conversation.scrollHeight;
}

/** Removes the loading bubble, if present, once a reply (or error) arrives. */
function removeLoading() {
  const el = document.getElementById("loading-indicator");
  if (el) el.remove();
}

/**
 * Appends one turn's tool-call trace to the "Agent activity" panel: the
 * tool name and its latency (duration_ms) for every tool the agent called
 * while producing that reply. Shows a placeholder line when no tools were
 * called (e.g. the model answered directly).
 */
function appendActivity(toolCalls) {
  const list = document.getElementById("activity-list");
  const entry = document.createElement("div");
  entry.className = "activity-entry";

  const label = document.createElement("div");
  label.className = "turn-label";
  label.textContent = "Turn " + (list.children.length + 1);
  entry.appendChild(label);

  if (!toolCalls || toolCalls.length === 0) {
    const none = document.createElement("div");
    none.className = "no-tools";
    none.textContent = "No tools called";
    entry.appendChild(none);
  } else {
    const ul = document.createElement("ul");
    toolCalls.forEach((call) => {
      const li = document.createElement("li");
      const ms = typeof call.duration_ms === "number" ? call.duration_ms + " ms" : "n/a";
      li.textContent = call.tool + " (" + ms + ")";
      ul.appendChild(li);
    });
    entry.appendChild(ul);
  }

  list.appendChild(entry);
  document.getElementById("activity-panel").scrollTop = document.getElementById("activity-panel").scrollHeight;
}

/**
 * Renders one Escalation Summary Skill result (or its error) into the
 * #escalation-result container: a color-coded risk badge, the executive
 * summary, the recommended next action, and any missing-information list
 * -- the same 4 fixed fields generate_escalation_summary() always returns.
 */
function renderEscalationResult(data) {
  const container = document.getElementById("escalation-result");
  container.innerHTML = "";

  if (data.error) {
    const err = document.createElement("div");
    err.className = "escalation-error";
    err.textContent = data.error;
    container.appendChild(err);
    return;
  }

  const badge = document.createElement("span");
  badge.className = "risk-badge risk-" + String(data.risk_level || "").toLowerCase();
  badge.textContent = (data.risk_level || "Unknown") + " risk";
  container.appendChild(badge);

  const header = document.createElement("div");
  header.className = "field-label";
  const issueCount = data.open_issue_count;
  header.textContent = data.customer_name + " (" + issueCount + " open issue" + (issueCount === 1 ? "" : "s") + ")";
  container.appendChild(header);

  const summary = document.createElement("div");
  summary.textContent = data.executive_summary;
  container.appendChild(summary);

  const actionLabel = document.createElement("div");
  actionLabel.className = "field-label";
  actionLabel.textContent = "Recommended next action";
  container.appendChild(actionLabel);

  const action = document.createElement("div");
  action.textContent = data.recommended_next_action;
  container.appendChild(action);

  if (data.missing_information && data.missing_information.length) {
    const missingLabel = document.createElement("div");
    missingLabel.className = "field-label";
    missingLabel.textContent = "Missing information";
    container.appendChild(missingLabel);

    const ul = document.createElement("ul");
    data.missing_information.forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      ul.appendChild(li);
    });
    container.appendChild(ul);
  }
}

/**
 * Sends the customer name in #escalation-customer-input to
 * POST /skills/escalation-summary and renders the structured result.
 * Unlike sendMessage(), there's no conversation/tool-call trace here --
 * this Skill is a single fixed request/response, not a multi-turn chat.
 */
async function generateEscalationSummary() {
  const input = document.getElementById("escalation-customer-input");
  const name = input.value.trim();
  if (!name) return;

  const btn = document.getElementById("escalation-generate-btn");
  const result = document.getElementById("escalation-result");
  btn.disabled = true;
  input.disabled = true;
  result.innerHTML = '<div class="msg agent loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';

  await ensureFreshToken();

  try {
    const res = await fetch("/skills/escalation-summary", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + keycloak.token,
      },
      body: JSON.stringify({ customer_name: name }),
    });
    const data = await res.json();
    renderEscalationResult(data);
  } catch (err) {
    renderEscalationResult({ error: "Something went wrong: " + err.message });
  } finally {
    btn.disabled = false;
    input.disabled = false;
  }
}

/**
 * Sends the current input box's text to POST /chat with a bearer token,
 * renders the agent's reply (or a clear denial message on 403), and
 * updates the Agent activity panel from the response's tool_calls trace.
 */
async function sendMessage() {
  const input = document.getElementById("message-input");
  const text = input.value.trim();
  if (!text) return;

  appendMessage("user", text);
  input.value = "";
  document.getElementById("send-btn").disabled = true;
  input.disabled = true;
  appendLoading();

  await ensureFreshToken();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + keycloak.token,
      },
      body: JSON.stringify({ message: text, conversation_id: conversationId }),
    });

    removeLoading();

    if (res.status === 403) {
      appendMessage("denied", "Your role does not permit this action.");
      return;
    }

    const data = await res.json();
    conversationId = data.conversation_id || conversationId;
    appendMessage("agent", data.reply || "(no response)");
    appendActivity(data.tool_calls);
  } catch (err) {
    removeLoading();
    appendMessage("denied", "Something went wrong reaching the assistant: " + err.message);
  } finally {
    document.getElementById("send-btn").disabled = false;
    input.disabled = false;
    input.focus();
  }
}

/**
 * Collapses/expands the Agent activity panel's list so it doesn't crowd
 * the chat on smaller screens.
 */
function toggleActivityPanel() {
  const list = document.getElementById("activity-list");
  const toggle = document.getElementById("activity-toggle");
  const collapsed = list.style.display === "none";
  list.style.display = collapsed ? "flex" : "none";
  toggle.innerHTML = "Agent activity " + (collapsed ? "&#9660;" : "&#9654;");
}

/**
 * Wires up the send button, Enter-to-send, logout, and the activity
 * panel's collapse toggle. Called once, after login succeeds.
 */
function wireUpControls() {
  document.getElementById("send-btn").addEventListener("click", sendMessage);
  document.getElementById("message-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });
  document.getElementById("logout-btn").addEventListener("click", () => keycloak.logout());
  document.getElementById("activity-toggle").addEventListener("click", toggleActivityPanel);
  document.getElementById("escalation-generate-btn").addEventListener("click", generateEscalationSummary);
  document.getElementById("escalation-customer-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") generateEscalationSummary();
  });

  document.getElementById("message-input").disabled = false;
  document.getElementById("send-btn").disabled = false;
  document.getElementById("escalation-customer-input").disabled = false;
  document.getElementById("escalation-generate-btn").disabled = false;
  document.getElementById("message-input").focus();
}

/**
 * Entry point: logs the user in, shows their identity, and enables the
 * chat UI. Runs once when the page loads.
 */
async function main() {
  try {
    await initKeycloak();
    await renderIdentityBadge();
    wireUpControls();
  } catch (err) {
    // Surface startup failures (Keycloak unreachable, bad realm config,
    // etc.) directly in the page instead of only in the browser console,
    // since a failure here otherwise leaves a blank, seemingly-frozen page.
    document.body.innerHTML =
      '<p style="padding:2rem;color:#b02a2a;">Failed to start: ' + err.message + "</p>";
  }
}

main();
</script>
</body>
</html>
